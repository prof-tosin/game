<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#12141c">
<title>The Table — Offline Game Hub</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="table">

  <header class="table-header">
    <div class="brand">
      <span class="brand-mark">♠</span>
      <h1>The Table</h1>
    </div>
    <p class="tagline">Pick a game. Play offline. No signal required.</p>
    <p class="status" id="netStatus" aria-live="polite"></p>
  </header>

  <main class="hand" id="hand" aria-label="Choose a game">
    <!-- Cards injected by app.js -->
  </main>

  <footer class="table-footer">
    <button class="install-btn" id="installBtn" hidden>Add to home screen</button>
  </footer>

</div>

<script src="js/app.js"></script>
</body>
</html>
